<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prefetch Worker 手动集成示例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    
    .status {
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    
    .status.success {
      background: #e8f5e9;
      border: 1px solid #4caf50;
      color: #2e7d32;
    }
    
    .status.error {
      background: #ffebee;
      border: 1px solid #f44336;
      color: #c62828;
    }
    
    .status.info {
      background: #e3f2fd;
      border: 1px solid #2196f3;
      color: #1565c0;
    }
    
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: #2196f3;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #1976d2;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .logs {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    
    .log-entry {
      margin-bottom: 8px;
      padding: 4px 0;
    }
    
    .log-entry.success {
      color: #4caf50;
    }
    
    .log-entry.error {
      color: #f44336;
    }
    
    .log-entry.info {
      color: #2196f3;
    }
    
    .timestamp {
      color: #888;
      margin-right: 8px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .stat-card {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: bold;
      color: #2196f3;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Prefetch Worker 手动集成示例</h1>
    <p class="subtitle">演示如何将 Prefetch Worker 集成到现有 Service Worker</p>
    
    <div id="status" class="status info">
      正在初始化...
    </div>
    
    <div class="controls">
      <button id="initBtn" onclick="initializePrefetch()">初始化 Prefetch</button>
      <button id="healthBtn" onclick="checkHealth()">健康检查</button>
      <button id="prefetchBtn" onclick="testPrefetch()" disabled>测试预请求</button>
      <button id="fetchBtn" onclick="testFetch()" disabled>测试普通请求</button>
      <button id="clearBtn" onclick="clearLogs()">清空日志</button>
    </div>
    
    <h3>📊 统计信息</h3>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="prefetchCount">0</div>
        <div class="stat-label">预请求次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="cacheHits">0</div>
        <div class="stat-label">缓存命中</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgTime">0ms</div>
        <div class="stat-label">平均响应时间</div>
      </div>
    </div>
    
    <h3>📝 日志</h3>
    <div id="logs" class="logs"></div>
  </div>
  
  <script>
    let swRegistration = null;
    let prefetchInitialized = false;
    let stats = {
      prefetchCount: 0,
      cacheHits: 0,
      totalTime: 0,
      requestCount: 0
    };
    
    // 添加日志
    function addLog(message, type = 'info') {
      const logsDiv = document.getElementById('logs');
      const timestamp = new Date().toLocaleTimeString();
      const logEntry = document.createElement('div');
      logEntry.className = `log-entry ${type}`;
      logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span>${message}`;
      logsDiv.appendChild(logEntry);
      logsDiv.scrollTop = logsDiv.scrollHeight;
    }
    
    // 更新状态
    function updateStatus(message, type = 'info') {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }
    
    // 更新统计
    function updateStats() {
      document.getElementById('prefetchCount').textContent = stats.prefetchCount;
      document.getElementById('cacheHits').textContent = stats.cacheHits;
      const avgTime = stats.requestCount > 0 
        ? Math.round(stats.totalTime / stats.requestCount) 
        : 0;
      document.getElementById('avgTime').textContent = `${avgTime}ms`;
    }
    
    // 注册 Service Worker
    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        addLog('❌ 浏览器不支持 Service Worker', 'error');
        updateStatus('浏览器不支持 Service Worker', 'error');
        return null;
      }
      
      try {
        addLog('正在注册 Service Worker...', 'info');
        const registration = await navigator.serviceWorker.register('/service-worker.js');
        addLog('✅ Service Worker 注册成功', 'success');
        
        // 等待激活
        await navigator.serviceWorker.ready;
        addLog('✅ Service Worker 已激活', 'success');
        
        return registration;
      } catch (error) {
        addLog(`❌ Service Worker 注册失败: ${error.message}`, 'error');
        updateStatus('Service Worker 注册失败', 'error');
        return null;
      }
    }
    
    // 初始化 Prefetch
    async function initializePrefetch() {
      if (!navigator.serviceWorker.controller) {
        addLog('⚠️ Service Worker 尚未控制页面，请刷新页面', 'error');
        updateStatus('请刷新页面以激活 Service Worker', 'error');
        return;
      }
      
      addLog('正在初始化 Prefetch Worker...', 'info');
      
      // 发送初始化消息
      navigator.serviceWorker.controller.postMessage({
        type: 'PREFETCH_INIT',
        config: {
          apiMatcher: '/api/*',
          defaultExpireTime: 30000,
          maxCacheSize: 100,
          debug: true
        }
      });
      
      // 等待响应
      setTimeout(() => {
        if (!prefetchInitialized) {
          addLog('⚠️ 初始化超时，请检查 Service Worker 日志', 'error');
        }
      }, 5000);
    }
    
    // 健康检查
    function checkHealth() {
      if (!navigator.serviceWorker.controller) {
        addLog('❌ Service Worker 未激活', 'error');
        return;
      }
      
      addLog('正在检查 Prefetch 状态...', 'info');
      navigator.serviceWorker.controller.postMessage({
        type: 'PREFETCH_HEALTH_CHECK'
      });
    }
    
    // 测试预请求
    async function testPrefetch() {
      const startTime = Date.now();
      addLog('🚀 发起预请求: /api/test', 'info');
      
      try {
        const response = await fetch('/api/test', {
          headers: {
            'X-Prefetch-Request-Type': 'prefetch',
            'X-Prefetch-Expire-Time': '30000'
          }
        });
        
        const data = await response.json();
        const duration = Date.now() - startTime;
        
        stats.prefetchCount++;
        stats.totalTime += duration;
        stats.requestCount++;
        updateStats();
        
        addLog(`✅ 预请求完成 (${duration}ms): ${JSON.stringify(data)}`, 'success');
      } catch (error) {
        addLog(`❌ 预请求失败: ${error.message}`, 'error');
      }
    }
    
    // 测试普通请求
    async function testFetch() {
      const startTime = Date.now();
      addLog('📡 发起普通请求: /api/test', 'info');
      
      try {
        const response = await fetch('/api/test');
        const data = await response.json();
        const duration = Date.now() - startTime;
        
        const fromCache = response.headers.get('X-Cache') === 'HIT';
        if (fromCache) {
          stats.cacheHits++;
        }
        
        stats.totalTime += duration;
        stats.requestCount++;
        updateStats();
        
        const cacheStatus = fromCache ? '(从缓存)' : '(网络请求)';
        addLog(`✅ 请求完成 ${cacheStatus} (${duration}ms): ${JSON.stringify(data)}`, 'success');
      } catch (error) {
        addLog(`❌ 请求失败: ${error.message}`, 'error');
      }
    }
    
    // 清空日志
    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
      addLog('日志已清空', 'info');
    }
    
    // 监听 Service Worker 消息
    navigator.serviceWorker.addEventListener('message', (event) => {
      const { type, data } = event.data;
      
      if (type === 'PREFETCH_INIT_SUCCESS') {
        prefetchInitialized = true;
        addLog('✅ Prefetch Worker 初始化成功', 'success');
        updateStatus('Prefetch Worker 已就绪', 'success');
        
        // 启用测试按钮
        document.getElementById('prefetchBtn').disabled = false;
        document.getElementById('fetchBtn').disabled = false;
      }
      
      if (type === 'PREFETCH_INIT_ERROR') {
        addLog(`❌ Prefetch Worker 初始化失败: ${event.data.error}`, 'error');
        updateStatus('Prefetch Worker 初始化失败', 'error');
      }
      
      if (type === 'PREFETCH_HEALTH_RESPONSE') {
        const status = event.data;
        addLog(`📊 健康检查结果:`, 'info');
        addLog(`   - 已加载: ${status.loaded ? '是' : '否'}`, 'info');
        addLog(`   - 已初始化: ${status.initialized ? '是' : '否'}`, 'info');
        addLog(`   - 加载尝试: ${status.attempts} 次`, 'info');
        
        if (status.loaded && status.initialized) {
          updateStatus('Prefetch Worker 运行正常', 'success');
        }
      }
    });
    
    // 页面加载时自动注册 Service Worker
    window.addEventListener('load', async () => {
      addLog('🌐 页面加载完成', 'info');
      
      swRegistration = await registerServiceWorker();
      
      if (swRegistration) {
        if (navigator.serviceWorker.controller) {
          updateStatus('Service Worker 已就绪，点击"初始化 Prefetch"开始', 'success');
        } else {
          updateStatus('Service Worker 已注册，请刷新页面以激活', 'info');
          addLog('⚠️ 首次加载需要刷新页面以激活 Service Worker', 'info');
        }
      }
    });
  </script>
</body>
</html>
