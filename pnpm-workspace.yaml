packages:
    # all packages in direct subdirs of packages/
    - 'packages/*'
    - 'demos/*'
    # test system
    - 'test-system'
    # test system api server (independent package)
    - 'test-system/api-server'
    # test apps (generated by automated tests)
    - 'test-apps/*'
    # test system demos (manual testing)
    - 'test-system/demos/*'
    # exclude packages that are inside test directories
    - '!**/test/**'
    - '!**/.next/**'
    - '!**/dist/**'
    - '!**/node_modules/**'
    # exclude templates (they are not meant to be run directly)
    - '!test-system/templates/**'
